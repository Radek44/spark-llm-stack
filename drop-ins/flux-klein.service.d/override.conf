# managed-by:harden-llm-stack
# Generated 2026-05-19T21:56:36-07:00 by harden-llm-stack.sh
# Revert: ./harden-llm-stack.sh --revert  (or rm this whole .d dir)

[Unit]


[Service]
# memory cap — when hit, kernel OOMs this cgroup only, host untouched
MemoryHigh=12G
MemoryMax=16G
OOMPolicy=stop
OOMScoreAdjust=200

# restart with a hard burst limit (3 fails in 10 min → systemd gives up)
Restart=on-failure
RestartSec=15
StartLimitBurst=3
StartLimitIntervalSec=600
