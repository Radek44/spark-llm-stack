[Unit]
Conflicts=qwen36-27b-smart.service qwen36-35b-fast.service qwen27-mtp.service gemma-31b.service gptoss-20b.service

[Service]
# memory cap — when hit, kernel OOMs this cgroup only, host untouched
MemoryHigh=70G
MemoryMax=80G
OOMPolicy=stop
OOMScoreAdjust=200

# restart with a hard burst limit (3 fails in 10 min → systemd gives up)
Restart=on-failure
RestartSec=15
StartLimitBurst=3
StartLimitIntervalSec=600
