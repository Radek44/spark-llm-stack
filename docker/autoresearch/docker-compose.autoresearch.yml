name: autoresearch

x-common: &common
  build:
    context: ../..
    dockerfile: docker/autoresearch/Dockerfile.base
  image: spark-autoresearch-base:latest
  network_mode: host
  gpus: all
  restart: "no"
  stdin_open: true
  tty: true
  environment:
    - UPSTREAM_ROOT=/workspace/upstreams
    - RUNS_ROOT=/workspace/runs
    - WORK_ROOT=/workspace/work
  volumes:
    - ${UPSTREAMS_DIR:-./upstreams}:/workspace/upstreams
    - ${RUNS_DIR:-./runs}:/workspace/runs
    - ${WORK_DIR:-./work}:/workspace/work
    - ${SECRETS_DIR:-./secrets}:/secrets:ro

services:
  karpathy:
    <<: *common
    container_name: spark-autoresearch-karpathy
    environment:
      - AUTORESEARCH_PROFILE=karpathy
      - TRAIN_TIMEOUT=${KARPATHY_TRAIN_TIMEOUT:-600}
    mem_limit: ${KARPATHY_MEM_LIMIT:-60g}
    mem_reservation: ${KARPATHY_MEM_RESERVATION:-45g}

  dgx:
    <<: *common
    container_name: spark-autoresearch-dgx
    environment:
      - AUTORESEARCH_PROFILE=dgx
      - TRAIN_TIMEOUT=${DGX_TRAIN_TIMEOUT:-600}
    mem_limit: ${DGX_MEM_LIMIT:-80g}
    mem_reservation: ${DGX_MEM_RESERVATION:-60g}

  nauto-orch:
    <<: *common
    container_name: spark-autoresearch-nauto-orch
    environment:
      - AUTORESEARCH_PROFILE=nauto-orch
      - NAUTO_ROLE=orchestrator
    mem_limit: ${NAUTO_ORCH_MEM_LIMIT:-40g}
    mem_reservation: ${NAUTO_ORCH_MEM_RESERVATION:-30g}

  nauto-worker:
    <<: *common
    container_name: spark-autoresearch-nauto-worker
    environment:
      - AUTORESEARCH_PROFILE=nauto-worker
      - NAUTO_ROLE=worker
    mem_limit: ${NAUTO_WORKER_MEM_LIMIT:-80g}
    mem_reservation: ${NAUTO_WORKER_MEM_RESERVATION:-60g}

  gemini:
    <<: *common
    container_name: spark-autoresearch-gemini
    environment:
      - AUTORESEARCH_PROFILE=gemini
    mem_limit: ${GEMINI_MEM_LIMIT:-8g}
    mem_reservation: ${GEMINI_MEM_RESERVATION:-4g}

  autokernel:
    <<: *common
    container_name: spark-autoresearch-autokernel
    environment:
      - AUTORESEARCH_PROFILE=autokernel
      - AUTOKERNEL_STAGE=${AUTOKERNEL_STAGE:-profile}
      - AUTOKERNEL_PROFILE_ARGS=${AUTOKERNEL_PROFILE_ARGS:-}
      - AUTOKERNEL_EXTRACT_ARGS=${AUTOKERNEL_EXTRACT_ARGS:-}
      - AUTOKERNEL_BENCH_ARGS=${AUTOKERNEL_BENCH_ARGS:-}
      - AUTOKERNEL_VERIFY_ARGS=${AUTOKERNEL_VERIFY_ARGS:-}
    mem_limit: ${AUTOKERNEL_MEM_LIMIT:-70g}
    mem_reservation: ${AUTOKERNEL_MEM_RESERVATION:-50g}
